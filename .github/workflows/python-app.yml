name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04   # ⬅️ مهم (نه 24)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
          python3-pip \
          build-essential \
          git zip unzip \
          openjdk-17-jdk \
          autoconf libtool pkg-config \
          libffi-dev \
          libssl-dev \
          zlib1g-dev

      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Accept licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Build APK
        run: |
          buildozer init || true
          yes | buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MohadesehGym-apk
          path: bin/*.apk
